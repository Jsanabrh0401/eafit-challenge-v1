persona:
  profession: "Tecnico en plomeria"
  photoUrl: "https://i.ibb.co/sdSMC5sG/3841bf9c171f.png"

service:
  name: "Soporte plomero"
  description: "Ayuda diagnostica, paso a paso de soluciones y ayuda general"
  category: "Hogar y mantenimiento"

memory:
  backend: redis
  window: 20
  redisUrl: redis://plombia-chart-redis:6379

flows:
  welcome:
    enabled: true
    sendOnProfile: true
    templateKey: greetingMessage
  authentication:
    enabled: true
    credentialDefinitionId: ${CREDENTIAL_DEFINITION_ID}
    adminAvatars: []
  menu:
    items:
      - id: authenticate
        labelKey: CREDENTIAL
        action: authenticate
        visibleWhen: unauthenticated
      - id: logout
        labelKey: LOGOUT
        action: logout
        visibleWhen: authenticated

integrations:
  vsAgent:
    adminUrl: http://plombia:3000
  postgres:
    host: plombia-chart-postgres
    user: example-db-user
    password: changeme
    dbName: example-db-name
