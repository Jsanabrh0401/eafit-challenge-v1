  en:
    greetingMessage: "Hi, I am Samuel. Please authenticate with your EAFIT credential."
    systemPrompt: "IDENTIDAD Y CONTEXTO DEL FORMULARIO (prioridad alta — úsalo cuando pregunten quién eres, tu profesión, tu servicio o datos sobre ti):\n- Nombre público / displayName: Samuel\n- Profesión: Plomero\n- Descripción de la persona: Samuel plomeria agente tecnico en plomeria\n- Nombre del servicio: Samuel plomeria\n- Categoría del servicio: plomeria\n- Descripción del servicio: Samuel plomeria agente tecnico en plomeria\nReglas:\n- Si preguntan por tu nombre, profesión, qué ofreces o quién eres, responde con la identidad anterior de forma natural y coherente.\n- No inventes datos fuera de esta identidad ni del bloque de instrucciones siguientes.\n- El RAG es opcional; la identidad anterior siempre aplica aunque no haya documentos.\nInstrucciones de comportamiento y tono (definidas por quien creó el agente):\nSamuel plomeria agente tecnico en plomeria"
    strings:
      ROOT_TITLE: "Samuel"
      LOGOUT: "Logout"
      CREDENTIAL: "Authenticate"
      MCP_CONFIG_MENU: "Configure MCP"
      MCP_CONFIG_ABORT: "Cancel configuration"
      WELCOME: "Welcome."
      AUTH_REQUIRED: "Authentication is required."
      AUTH_SUCCESS: "Authentication completed."
      AUTH_SUCCESS_NAME: "Hi, {name}. You are authenticated."
      WAITING_CREDENTIAL: "Waiting for credential..."
      AUTH_PROCESS_STARTED: "Authentication started."
      ERROR_MESSAGES: "Service temporarily unavailable."
      LOGOUT_CONFIRMATION: "Session closed."

llm:
  provider: openai
  model: llama-3.3-70b-versatile
  baseUrl: https://api.groq.com/openai/v1
  temperature: 0.4
  agentPrompt: "IDENTIDAD Y CONTEXTO DEL FORMULARIO (prioridad alta — úsalo cuando pregunten quién eres, tu profesión, tu servicio o datos sobre ti):\n- Nombre público / displayName: Samuel\n- Profesión: Plomero\n- Descripción de la persona: Samuel plomeria agente tecnico en plomeria\n- Nombre del servicio: Samuel plomeria\n- Categoría del servicio: plomeria\n- Descripción del servicio: Samuel plomeria agente tecnico en plomeria\nReglas:\n- Si preguntan por tu nombre, profesión, qué ofreces o quién eres, responde con la identidad anterior de forma natural y coherente.\n- No inventes datos fuera de esta identidad ni del bloque de instrucciones siguientes.\n- El RAG es opcional; la identidad anterior siempre aplica aunque no haya documentos.\nInstrucciones de comportamiento y tono (definidas por quien creó el agente):\nSamuel plomeria agente tecnico en plomeria"

rag:
  provider: langchain
  docsPath: /app/rag/docs
  remoteUrls:
    - https://raw.githubusercontent.com/verana-labs/eafit-challenge-agent-example/main/docs/README.md

persona:
  profession: "Plomero"
  photoUrl: ""

service:
  name: "Samuel plomeria"
  description: "Samuel plomeria agente tecnico en plomeria"
  category: "plomeria"

memory:
  backend: redis
  window: 20
  redisUrl: redis://samuel-chart-redis:6379

flows:
  welcome:
    enabled: true
    sendOnProfile: true
    templateKey: greetingMessage
  authentication:
    enabled: true
    credentialDefinitionId: ${CREDENTIAL_DEFINITION_ID}
    adminAvatars: []
  menu:
    items:
      - id: authenticate
        labelKey: CREDENTIAL
        action: authenticate
        visibleWhen: unauthenticated
      - id: logout
        labelKey: LOGOUT
        action: logout
        visibleWhen: authenticated
      - id: mcp-config
        labelKey: MCP_CONFIG_MENU
        action: mcp-config
        visibleWhen: notConfiguring
      - id: abort-config
        labelKey: MCP_CONFIG_ABORT
        action: abort-config
        visibleWhen: configuring


mcp:
  servers:
    - name: google-calendar
      transport: streamable-http
      url: ${GOOGLE_CALENDAR_MCP_URL}
      accessMode: user-controlled
      userConfig:
        fields:
          - name: token
            type: secret
            label:
              en: "Google Calendar token:"
              es: "Token de Google Calendar:"
            headerTemplate: "Bearer {value}"
      toolAccess:
        default: public

integrations:
  vsAgent:
    adminUrl: http://samuel:3000
  postgres:
    host: samuel-chart-postgres
    user: example-db-user
    password: changeme
    dbName: example-db-name
